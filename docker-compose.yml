services:
  sonarfort:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Pass proxy into build stage so pip/curl can reach internet
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1}
    image: sonarfort-ai:latest
    container_name: sonarfort-ai
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "80:80"
      - "8000:8000"
      - "8001:8001"
    environment:
      # Proxy vars explicitly set for runtime API calls (Fortify, Sonar, GCP)
      HTTP_PROXY:  ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      http_proxy:  ${HTTP_PROXY:-}
      https_proxy: ${HTTPS_PROXY:-}
      NO_PROXY:    "localhost,127.0.0.1,169.254.169.254"
      no_proxy:    "localhost,127.0.0.1,169.254.169.254"
      PYTHONHTTPSVERIFY: "0"
      REQUESTS_CA_BUNDLE: ""
      CURL_CA_BUNDLE: ""
    volumes:
      - ./.env:/app/.env
      - ./.env:/app/sonar-ai/.env
      - ./.env:/app/fortify-ai/.env
      - ${MAVEN_PROJECT_PATH:-./workspace}:/workspace
      - fortifyai-output:/tmp/fortifyai
      - sonar-uploads:/app/sonar-ai/uploads
      - chroma-data:/app/sonar-ai/chroma
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health/sonar"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  fortifyai-output:
  sonar-uploads:
  chroma-data: