services:
  sonarfort:
    build:
      context: .
      dockerfile: Dockerfile
    image: sonarfort-ai:latest
    container_name: sonarfort-ai
    restart: unless-stopped
    # Load .env from host — injects all vars into container environment
    env_file:
      - .env
    ports:
      - "80:80"       # Angular UI — http://localhost
      - "8000:8000"   # SonarAI API — http://localhost:8000/docs
      - "8001:8001"   # FortifyAI API — http://localhost:8001/docs
    volumes:
      - ${MAVEN_PROJECT_PATH:-./workspace}:/workspace
      - ${GOOGLE_APPLICATION_CREDENTIALS_DIR:-~/.config/gcloud}:/root/.config/gcloud:ro
      - fortifyai-output:/tmp/fortifyai
      - sonar-uploads:/app/sonar-ai/uploads
      - chroma-data:/app/sonar-ai/chroma
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health/sonar"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  fortifyai-output:
  sonar-uploads:
  chroma-data: