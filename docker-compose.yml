services:
  sonarfort:
    build:
      context: .
      dockerfile: Dockerfile
    image: sonarfort-ai:latest
    container_name: sonarfort-ai
    restart: unless-stopped
    # Load .env into container OS environment (primary method)
    env_file:
      - .env
    ports:
      - "80:80"
      - "8000:8000"
      - "8001:8001"
    volumes:
      # Mount .env directly into all locations both pipelines look for it
      # Changes to .env take effect with just: docker compose restart
      - ./.env:/app/.env:ro
      - ./.env:/app/sonar-ai/.env:ro
      - ./.env:/app/fortify-ai/.env:ro
      # Other volumes
      - ${MAVEN_PROJECT_PATH:-./workspace}:/workspace
      - fortifyai-output:/tmp/fortifyai
      - sonar-uploads:/app/sonar-ai/uploads
      - chroma-data:/app/sonar-ai/chroma
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health/sonar"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  fortifyai-output:
  sonar-uploads:
  chroma-data: