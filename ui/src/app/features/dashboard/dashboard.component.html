<div class="page">

  <!-- ── Header ── -->
  <div class="page-header">
    <div>
      <h1>Dashboard</h1>
      <p class="meta">SonarQube + Fortify → LLM fix → GitHub PR</p>
    </div>
    <a routerLink="/pipeline" class="run-btn">
      <svg width="11" height="11" viewBox="0 0 11 11" fill="none">
        <path d="M1.5 1L9.5 5.5L1.5 10V1Z" fill="currentColor"/>
      </svg>
      Run Pipeline
    </a>
  </div>

  <!-- ── SonarQube pipeline flow ── -->
  <div class="flow-section">
    <div class="flow-section__title flow-section__title--sonar">
      <svg width="13" height="13" viewBox="0 0 14 14" fill="none">
        <circle cx="5" cy="7" r="2.2" stroke="currentColor" stroke-width="1.3"/>
        <path d="M7.2 7H9.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
        <circle cx="11" cy="7" r="1.5" stroke="currentColor" stroke-width="1.2"/>
      </svg>
      SonarQube pipeline
    </div>
    <div class="flow-track">
      <ng-container *ngFor="let step of sonarSteps; let i = index; let last = last">
        <div class="flow-node flow-node--sonar">
          <div class="flow-node__badge flow-node__badge--sonar">{{ i + 1 }}</div>
          <div class="flow-node__name">{{ step.name }}</div>
          <div class="flow-node__desc">{{ step.desc }}</div>
        </div>
        <div class="flow-arrow" *ngIf="!last">
          <svg width="24" height="12" viewBox="0 0 24 12" fill="none">
            <path d="M0 6H20" stroke="currentColor" stroke-width="1.2" stroke-dasharray="3 2"/>
            <path d="M17 3L22 6L17 9" stroke="currentColor" stroke-width="1.2"
                  stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          </svg>
        </div>
      </ng-container>
    </div>
  </div>

  <!-- ── Fortify pipeline flow ── -->
  <div class="flow-section flow-section--fortify">
    <div class="flow-section__title flow-section__title--fortify">
      <svg width="13" height="13" viewBox="0 0 14 14" fill="none">
        <path d="M7 1.5L12 4V8C12 11 7 13 7 13C7 13 2 11 2 8V4L7 1.5Z"
              stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/>
      </svg>
      Fortify pipeline
    </div>
    <div class="flow-track">
      <ng-container *ngFor="let step of fortifySteps; let i = index; let last = last">
        <div class="flow-node flow-node--fortify">
          <div class="flow-node__badge flow-node__badge--fortify">{{ i + 1 }}</div>
          <div class="flow-node__name">{{ step.name }}</div>
          <div class="flow-node__desc">{{ step.desc }}</div>
        </div>
        <div class="flow-arrow" *ngIf="!last">
          <svg width="24" height="12" viewBox="0 0 24 12" fill="none">
            <path d="M0 6H20" stroke="currentColor" stroke-width="1.2" stroke-dasharray="3 2"/>
            <path d="M17 3L22 6L17 9" stroke="currentColor" stroke-width="1.2"
                  stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          </svg>
        </div>
      </ng-container>
    </div>
  </div>

</div>
